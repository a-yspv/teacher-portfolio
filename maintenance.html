<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>М.А. Юсупова | Портфолио — На обслуживании</title>
<style>
:root{--bg:#09090b;--surface:rgba(255,255,255,.03);--border:rgba(255,255,255,.06);--t:#fafafa;--t2:#a1a1aa;--t3:#71717a;--a:#a78bfa;--a2:#f472b6;--r:20px;--sd:'Playfair Display',Georgia,serif;--sb:'Inter',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sb);background:var(--bg);color:var(--t);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}

.bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 50%,rgba(167,139,250,.08),transparent);animation:ml 12s ease-in-out infinite alternate}
@keyframes ml{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(30deg)}}

.particles{position:absolute;inset:0;pointer-events:none}
.p{position:absolute;border-radius:50%;opacity:0;animation:float linear infinite}
@keyframes float{0%{opacity:0;transform:translateY(100vh) scale(0)}10%{opacity:.6}90%{opacity:.6}100%{opacity:0;transform:translateY(-100vh) scale(1)}}

.card{position:relative;z-index:1;text-align:center;padding:48px;max-width:500px;width:90%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);backdrop-filter:blur(20px);animation:fu .8s ease forwards;opacity:0}
@keyframes fu{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.icon{font-size:3rem;margin-bottom:20px;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

h1{font-family:var(--sd);font-size:1.8rem;font-weight:400;margin-bottom:12px}
h1 em{font-style:italic;background:linear-gradient(135deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

p{font-size:.92rem;color:var(--t2);line-height:1.7;margin-bottom:24px}

.line{width:60px;height:2px;background:linear-gradient(90deg,var(--a),var(--a2));border-radius:2px;margin:0 auto 24px}

@media(max-width:480px){.card{padding:32px 24px}h1{font-size:1.4rem}}
</style>
</head>
<body>

<div class="bg"></div>
<div class="particles" id="particles"></div>

<div class="card">
<div class="icon">🔧</div>
<h1>Сайт на <em>обслуживании</em></h1>
<div class="line"></div>
<p>Мы работаем над улучшениями.<br>Сайт снова будет доступен совсем скоро.</p>
</div>

<script>
// Particles
var c = document.getElementById('particles');
function create(){
  var p = document.createElement('div');
  p.className = 'p';
  var size = Math.random()*3+1;
  var colors = ['rgba(167,139,250,','rgba(244,114,182,','rgba(52,211,153,'];
  var col = colors[Math.floor(Math.random()*colors.length)];
  var op = Math.random()*.4+.1;
  p.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+Math.random()*100+'%;bottom:-10px;background:'+col+op+');box-shadow:0 0 '+size*3+'px '+col+(op*.5)+');animation-duration:'+(Math.random()*8+6)+'s;animation-delay:'+Math.random()*2+'s';
  c.appendChild(p);
  setTimeout(function(){p.remove()},16000);
}
setInterval(create,500);
for(var i=0;i<12;i++) setTimeout(create,i*200);
</script>
</body>
</html>
